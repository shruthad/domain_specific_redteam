domain: banking_finance
dataset_version: 1.0.0
min_per_category: 5
max_per_category: 10

# Keep the default build fully local and deterministic.
# Turn these on only when the optional tools are installed and you want expansion.
use_deepteam: false
use_garak: false

deepteam:
  vulnerabilities:
    - prompt_injection
    - pii_leakage
    - rag_exfiltration
  attack_types:
    - jailbreak
    - developer_override
    - rag_exfiltration
    - data_extraction
  risk_categories: []
  min_difficulty: null
  max_difficulty: 4
  max_seed_records: 25
  variants_per_seed: 2
  include_original_attack_type: true

garak:
  enabled: false
  auto_install: false
  target_model: null
  max_findings: 10
  report_dir: data/generated/garak_reports
  probe_families:
    - hallucination
    - data_leakage
    - prompt_injection
    - jailbreak
    - encoding_obfuscation
    - rag_exfiltration
    - tool_misuse
  attack_types: []
  risk_categories: []
  min_difficulty: null
  max_difficulty: 5
  max_patterns: 20
  include_static_patterns: true
  include_parsed_findings: true

evaluation:
  provider: gemini
  model: gemini-2.5-flash
  max_concurrency: 1
  delay_ms: 5000
  smoke_test_count: 1

output:
  jsonl: data/exports/finance_redteam_attacks.jsonl
  promptfoo_yaml: data/exports/promptfoo_tests.yaml
  normalized_jsonl: data/generated/normalized_attacks.jsonl
  deepteam_jsonl: data/generated/deepteam_variants.jsonl
  garak_jsonl: data/generated/garak_patterns.jsonl
  run_metadata_json: data/generated/run_metadata.json
